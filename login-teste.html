<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planni — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --p1:#6c63ff; --p2:#8b7ff0; --b1:#5b8def; --b2:#7aa5f5;
  --ink:#1a1c3a; --ink2:#5a5d82;
  --font:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);-webkit-font-smoothing:antialiased}
body{
  min-height:100vh; overflow:hidden; position:relative;
  background:linear-gradient(160deg,#eef1ff 0%,#e8ecff 30%,#eae6ff 70%,#f3eeff 100%);
  display:flex; align-items:center; justify-content:center; padding:24px;
}

/* Balões ambientais ao fundo */
.bg-balloons{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
.balloon{position:absolute;border-radius:50% 50% 50% 10px;animation:float linear infinite}
.balloon.solid{background:linear-gradient(135deg,var(--p1),var(--b1));box-shadow:0 8px 24px rgba(108,99,255,.25)}
.balloon.soft{background:linear-gradient(135deg,rgba(108,99,255,.35),rgba(91,141,239,.32))}
.balloon.outline{background:transparent;border:2.5px solid rgba(108,99,255,.45)}
.balloon.outline-b{background:transparent;border:2.5px solid rgba(91,141,239,.42)}

@keyframes float{
  0%{transform:translateY(0) translateX(0) rotate(0deg)}
  25%{transform:translateY(-30px) translateX(15px) rotate(4deg)}
  50%{transform:translateY(-12px) translateX(-12px) rotate(-3deg)}
  75%{transform:translateY(-38px) translateX(8px) rotate(2deg)}
  100%{transform:translateY(0) translateX(0) rotate(0deg)}
}

/* Card de login — vidro fosco */
.login-card{
  position:relative; z-index:2; width:100%; max-width:380px;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border:1px solid rgba(255,255,255,.8);
  border-radius:32px; padding:40px 32px 32px;
  box-shadow:0 24px 70px rgba(60,50,160,.18),0 2px 8px rgba(60,50,160,.06);
  animation:cardIn .8s cubic-bezier(.2,.8,.2,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

.brand{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
.brand-icon{
  width:88px;height:88px;border-radius:24px;
  background:linear-gradient(135deg,#8ab4f8 0%,#6c63ff 55%,#a78bf0 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 32px rgba(108,99,255,.4),0 0 0 1px rgba(255,255,255,.2) inset;
  margin-bottom:18px; animation:logoFloat 4s ease-in-out infinite;
}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.brand-icon img{width:62px;height:62px;object-fit:contain}
.brand-name{font-size:30px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.brand-tag{font-size:13px;font-weight:500;color:var(--ink2);margin-top:4px;letter-spacing:.01em}

.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;letter-spacing:.01em}
.field input{
  width:100%;padding:14px 16px;border:1.5px solid rgba(108,99,255,.16);
  border-radius:14px;font-family:var(--font);font-size:15px;font-weight:500;color:var(--ink);
  background:rgba(255,255,255,.7);transition:all .2s;outline:none;
}
.field input::placeholder{color:#a4a7c4}
.field input:focus{border-color:var(--p1);background:#fff;box-shadow:0 0 0 4px rgba(108,99,255,.1)}

.btn-primary{
  width:100%;margin-top:8px;padding:15px;border:none;border-radius:14px;cursor:pointer;
  font-family:var(--font);font-size:15px;font-weight:700;color:#fff;letter-spacing:.01em;
  background:linear-gradient(135deg,#6c63ff,#5b8def);
  box-shadow:0 8px 24px rgba(108,99,255,.36);transition:all .2s;
}
.btn-primary:active{transform:scale(.98)}
.btn-primary:hover{box-shadow:0 10px 30px rgba(108,99,255,.46)}

.divider{display:flex;align-items:center;gap:12px;margin:22px 0 18px;color:#a4a7c4;font-size:12px;font-weight:500}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(108,99,255,.14)}

.btn-google{
  width:100%;padding:13px;border:1.5px solid rgba(108,99,255,.16);border-radius:14px;cursor:pointer;
  font-family:var(--font);font-size:14px;font-weight:600;color:var(--ink);background:rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;
}
.btn-google:active{transform:scale(.98)}
.btn-google:hover{background:#fff;border-color:rgba(108,99,255,.3)}
.btn-google svg{width:18px;height:18px}

.footer-text{text-align:center;font-size:13px;color:var(--ink2);margin-top:22px;font-weight:500}
.footer-text a{color:var(--p1);text-decoration:none;font-weight:700}

@media (prefers-reduced-motion:reduce){
  .balloon,.brand-icon,.login-card{animation:none}
}
</style>
</head>

<script>
const styles=['solid','soft','outline','outline-b','soft','outline'];
const wrap=document.getElementById('balloons');
const N=12;
for(let i=0;i<N;i++){
  const b=document.createElement('div');
  const cls=styles[i%styles.length];

  const size=40+Math.random()*90;

  b.style.left=Math.random()*100+'%';
  b.style.top=Math.random()*100+'%';
  b.style.animationDuration=(14+Math.random()*12)+'s';
  b.style.animationDelay=(-Math.random()*10)+'s';
  b.style.opacity=(0.4+Math.random()*0.35).toFixed(2);
  wrap.appendChild(b);
}
