<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teste API Extrato</title>
<style>
  body{font-family:-apple-system,system-ui,sans-serif;margin:0;padding:18px;background:#f4f6fb;color:#0d1f3c}
  h1{font-size:18px;margin:0 0 4px}
  p.sub{margin:0 0 16px;color:#667;font-size:13px}
  .card{background:#fff;border:1.5px solid #dde3ee;border-radius:14px;padding:16px;margin-bottom:14px}
  label{font-weight:700;font-size:13px;display:block;margin-bottom:8px}
  input[type=file]{width:100%;font-size:14px}
  button{margin-top:12px;width:100%;border:none;border-radius:100px;padding:13px;font-weight:800;font-size:15px;background:#5b6ef5;color:#fff;cursor:pointer}
  button:disabled{opacity:.5}
  .step{font-size:12px;color:#667;margin:6px 0}
  .ok{color:#157a45;font-weight:700}
  .err{color:#b02010;font-weight:700}
  pre{white-space:pre-wrap;word-break:break-word;font-size:11.5px;background:#0d1f3c;color:#9fe7c0;padding:12px;border-radius:10px;overflow-x:auto;max-height:420px;overflow-y:auto}
  .meta{font-size:12px;color:#445;margin:4px 0}
  .meta b{color:#0d1f3c}
</style>
</head>
<body>
  <h1>🔬 Teste da API /api/extrato</h1>
  <p class="sub">Mostra a resposta crua, sem esconder erros. Hospede este arquivo no mesmo domínio do Planni.</p>

  <div class="card">
    <label>Selecione o extrato (PDF, CSV, OFX, imagem)</label>
    <input type="file" id="file" accept=".pdf,.csv,.ofx,.txt,image/*">
    <button id="btn" onclick="run()">Enviar e ver resposta crua</button>
  </div>

  <div class="card" id="info" style="display:none">
    <div class="meta">Arquivo: <b id="m-name">—</b></div>
    <div class="meta">Tipo detectado (mime): <b id="m-mime">—</b></div>
    <div class="meta">Modo de leitura: <b id="m-mode">—</b></div>
    <div class="meta">Tamanho base64: <b id="m-b64">—</b></div>
    <div class="meta">Status HTTP da API: <b id="m-status">—</b></div>
  </div>

  <div class="card" id="out-card" style="display:none">
    <label>Resposta da API</label>
    <div id="steps"></div>
    <pre id="out">—</pre>
  </div>

<script>
function $(id){return document.getElementById(id);}
function step(txt,cls){var d=document.createElement('div');d.className='step '+(cls||'');d.textContent=txt;$('steps').appendChild(d);}

function toBase64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(e){res(String(e.target.result).split(',')[1]);};
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}
function toText(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(e){res(String(e.target.result));};
    r.onerror=rej;
    r.readAsText(file,'utf-8');
  });
}

async function run(){
  var file=$('file').files[0];
  if(!file){alert('Selecione um arquivo primeiro.');return;}
  $('btn').disabled=true;
  $('info').style.display='block';
  $('out-card').style.display='block';
  $('steps').innerHTML='';
  $('out').textContent='—';

  var ext=file.name.split('.').pop().toLowerCase();
  var isImage=file.type.indexOf('image/')===0;
  var isPdf=file.type==='application/pdf'||ext==='pdf';

  $('m-name').textContent=file.name+' ('+Math.round(file.size/1024)+' KB)';
  $('m-mime').textContent=isPdf?'application/pdf':(isImage?(file.type||'image/?'):'(texto)');
  $('m-mode').textContent=(isImage||isPdf)?'base64 (binário)':'texto';

  try{
    var payload={};
    if(isImage||isPdf){
      var b64=await toBase64(file);
      payload.image=b64;
      payload.mime=isPdf?'application/pdf':(file.type||'image/jpeg');
      $('m-b64').textContent=Math.round(b64.length/1024)+' KB';
    }else{
      payload.text=await toText(file);
      $('m-b64').textContent='(texto, '+payload.text.length+' chars)';
    }

    step('→ Enviando para /api/extrato ...');
    var resp=await fetch('/api/extrato',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    $('m-status').textContent=resp.status+' '+resp.statusText;
    step('← Resposta recebida (HTTP '+resp.status+')', resp.ok?'ok':'err');

    var textResp=await resp.text();
    var pretty=textResp;
    try{ pretty=JSON.stringify(JSON.parse(textResp),null,2); }catch(e){}
    $('out').textContent=pretty;

    if(!resp.ok){ step('⚠️ A API retornou erro HTTP.','err'); }
    else{
      try{
        var d=JSON.parse(textResp);
        if(d.error){ step('⚠️ A API respondeu 200 mas com campo "error".','err'); }
        else if(d.transactions && d.transactions.length){ step('✓ '+d.transactions.length+' transações encontradas!','ok'); }
        else{ step('⚠️ 200 OK, mas transactions vazio (Gemini não extraiu nada).','err'); }
      }catch(e){ step('⚠️ Resposta não é JSON válido.','err'); }
    }
  }catch(err){
    $('m-status').textContent='FALHA NA REQUISIÇÃO';
    step('✖ Erro de rede / exceção: '+String(err),'err');
    $('out').textContent=String(err)+'\n\n'+(err && err.stack ? err.stack : '');
  }finally{
    $('btn').disabled=false;
  }
}
</script>
</body>
</html>
